<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#090D19">
<title>Kinetic Coach</title>
<style>
:root{--bg:#090D19;--panel:#141B2C;--panel2:#1B2439;--muted:#939DBB;--accent:#8F7CFF;--rest:#43D3A0;--text:#fff;--danger:#ffcf67}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button{font:inherit;color:inherit}
.app{height:100dvh;max-width:760px;margin:auto;padding:max(10px,env(safe-area-inset-top)) 12px max(10px,env(safe-area-inset-bottom));display:grid;grid-template-rows:44px minmax(0,1fr) 54px;gap:8px;overflow:hidden}
header{display:flex;justify-content:space-between;align-items:center;min-height:0}
.brand{font-weight:900;letter-spacing:1.8px;color:var(--accent);font-size:12px}
.statusButton{border:0;background:transparent;padding:2px 0;text-align:left;cursor:pointer}
.meta{color:var(--muted);font-size:13px;margin-top:2px}
.meta.link{text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.badge{padding:7px 11px;border-radius:999px;background:#28204E;font-weight:900;font-size:10px;letter-spacing:1px;min-width:64px;text-align:center}
/* MENU */
.menu{min-height:0;overflow:auto;display:flex;flex-direction:column;justify-content:center;gap:18px;padding:6px 2px}
.menuHero h1{font-size:clamp(30px,8vw,46px);line-height:1.02;font-weight:950;margin:0}
.menuHero p{color:var(--muted);margin:8px 0 0;font-size:14px}
.section-label{font-size:11px;font-weight:900;letter-spacing:1.6px;color:var(--muted);margin-bottom:10px}
.diffGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.diffCard{border:1px solid #2a3550;background:var(--panel);border-radius:18px;padding:16px 12px;text-align:left;cursor:pointer;transition:transform .12s ease,border-color .12s ease,background .12s ease}
.diffCard:active{transform:scale(.98)}
.diffCard.sel{border-color:var(--accent);background:rgba(143,124,255,.16);box-shadow:0 0 0 1px var(--accent) inset}
.diffCard .dt{font-weight:900;font-size:17px}
.diffCard .dd{color:var(--muted);font-size:11px;margin-top:4px;line-height:1.3}
.focusWrap{margin-top:4px}
.focusInput{width:100%;border:1px solid #2a3550;background:var(--panel);color:var(--text);border-radius:14px;padding:14px 14px;font-size:15px;outline:none}
.focusInput:focus{border-color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.chip{border:1px solid #2a3550;background:var(--panel2);color:var(--muted);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
.chip.on{border-color:var(--accent);color:#fff;background:rgba(143,124,255,.22)}
.startBtn{border:0;border-radius:16px;background:var(--accent);color:#fff;font-weight:900;font-size:17px;padding:16px;cursor:pointer;margin-top:4px}
.startBtn:active{transform:scale(.99)}
.planPreview{color:var(--muted);font-size:12px;text-align:center;margin-top:2px}
/* WORK */
.stage{min-height:0;display:grid;grid-template-rows:72px minmax(0,1fr) 22px;gap:8px}
.topline{display:grid;grid-template-columns:minmax(0,1fr) 100px;align-items:end;gap:10px;min-height:0}
.eyebrow{color:var(--muted);font-size:10px;font-weight:900;letter-spacing:1.6px}
.title{font-size:clamp(23px,5.6vw,40px);line-height:1;font-weight:950;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timer{font-size:clamp(50px,12vw,78px);line-height:.82;font-weight:950;letter-spacing:-4px;text-align:right;font-variant-numeric:tabular-nums}
.timer.urgent{color:var(--danger)}
.media{min-height:0;border-radius:20px;overflow:hidden;background:var(--panel);position:relative;isolation:isolate}
.media video,.media img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center 46%;display:block;background:#0d1322;transition:opacity .18s ease}
.media img{object-fit:contain;background:#f4f5fa}
.media .hide{opacity:0;pointer-events:none}
.media.is-switching .show{opacity:.16}
.sound{position:absolute;top:9px;right:9px;border:0;border-radius:999px;background:rgba(9,13,25,.78);padding:7px 10px;font-weight:800;z-index:3}
.phaseOverlay{position:absolute;inset:auto 9px 9px 9px;padding:8px 10px;border-radius:12px;background:rgba(9,13,25,.82);backdrop-filter:blur(10px);display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;z-index:2}
.cue{font-size:13px;font-weight:800;line-height:1.2}
.next{font-size:11px;color:var(--muted);text-align:right;white-space:nowrap}
.bottomInfo{display:grid;gap:6px}
.progress{height:8px;background:#1A2238;border-radius:99px;overflow:hidden}
.fill{height:100%;background:var(--accent);width:100%;transition:width .25s linear}
.roundStrip{display:flex;gap:3px}
.roundDot{height:4px;border-radius:99px;background:#273149;flex:1}
.roundDot.done{background:#607093}.roundDot.active{background:var(--accent)}
.controls{height:54px;display:grid;grid-template-columns:1fr 1.35fr 1fr;gap:8px}
.btn{border:0;border-radius:15px;background:#161E32;color:#CDD2E3;font-weight:850;min-width:0}
.btn.primary{background:var(--accent);color:white}.btn:disabled{opacity:.45}
.modal{position:fixed;inset:0;background:rgba(4,7,14,.72);backdrop-filter:blur(8px);display:grid;place-items:end center;padding:12px;z-index:10}
.hidden{display:none!important}
.sheet{width:min(680px,100%);max-height:min(84dvh,720px);background:var(--panel);border:1px solid #2a3550;border-radius:24px;display:grid;grid-template-rows:auto minmax(0,1fr);overflow:hidden}
.sheetHead{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid #29334c}
.sheetTitle{font-size:20px;font-weight:900}.close{border:0;background:#222c43;border-radius:11px;padding:8px 11px}
.plan{overflow:auto;padding:10px}
.planItem{display:grid;grid-template-columns:34px minmax(0,1fr) auto;align-items:center;gap:10px;padding:10px;border-radius:14px;margin:3px 0}
.planItem.active{background:rgba(143,124,255,.18);outline:1px solid rgba(143,124,255,.55)}
.planItem.done{opacity:.48}
.num{width:30px;height:30px;display:grid;place-items:center;border-radius:9px;background:#222c43;font-size:12px;font-weight:900}
.planName{font-weight:850}.planTiming{font-size:12px;color:var(--muted)}
.complete{height:100%;display:grid;place-items:center;text-align:center}
.complete h1{font-size:48px;margin:8px 0}
@media(max-height:720px){.app{grid-template-rows:40px minmax(0,1fr) 48px;gap:6px}.stage{grid-template-rows:60px minmax(0,1fr) 18px;gap:6px}.controls{height:48px}.title{font-size:27px}.timer{font-size:54px}}
@media(max-width:420px){.diffGrid{grid-template-columns:1fr;gap:8px}.diffCard{display:flex;align-items:baseline;gap:10px}.diffCard .dd{margin-top:0}.stage{grid-template-rows:64px minmax(0,1fr) 20px}.title{font-size:26px}.timer{font-size:52px}.phaseOverlay{grid-template-columns:1fr}.next{text-align:left}}
</style>
</head>
<body>
<main class="app" id="app">
<header>
  <div><div class="brand">KINETIC COACH</div><button class="statusButton" id="planButton" type="button" aria-label="Open workout plan"><div class="meta link hidden" id="meta">20:00 left</div></button></div>
  <div class="badge hidden" id="badge">READY</div>
</header>

<!-- MENU -->
<section class="menu" id="menuStage">
  <div class="menuHero"><h1>Let's move.</h1><p>Pick your intensity and what you want to work. I'll build the session.</p></div>
  <div>
    <div class="section-label">INTENSITY</div>
    <div class="diffGrid" id="diffGrid">
      <button class="diffCard" data-diff="easy" type="button"><div class="dt">Easy</div><div class="dd">Gentle pace · low impact · ~10 min</div></button>
      <button class="diffCard sel" data-diff="medium" type="button"><div class="dt">Medium</div><div class="dd">Balanced burn · mixed · ~14 min</div></button>
      <button class="diffCard" data-diff="hard" type="button"><div class="dt">Hard</div><div class="dd">High intensity · plyo · ~18 min</div></button>
    </div>
  </div>
  <div>
    <div class="section-label">EQUIPMENT</div>
    <div class="diffGrid" id="equipGrid">
      <button class="diffCard sel" data-equip="none" type="button"><div class="dt">None</div><div class="dd">Bodyweight only</div></button>
      <button class="diffCard" data-equip="dumbbell" type="button"><div class="dt">Dumbbells</div><div class="dd">Home dumbbells</div></button>
      <button class="diffCard" data-equip="gym" type="button"><div class="dt">Gym</div><div class="dd">Full equipment</div></button>
    </div>
  </div>
  <div class="focusWrap">
    <div class="section-label">FOCUS (OPTIONAL)</div>
    <input class="focusInput" id="focusInput" type="text" placeholder="e.g. core and glutes, upper body, cardio…" autocomplete="off">
    <div class="chips" id="chips">
      <button class="chip" data-focus="core" type="button">Core</button>
      <button class="chip" data-focus="legs" type="button">Legs</button>
      <button class="chip" data-focus="glutes" type="button">Glutes</button>
      <button class="chip" data-focus="upper" type="button">Upper body</button>
      <button class="chip" data-focus="cardio" type="button">Cardio</button>
      <button class="chip" data-focus="full" type="button">Full body</button>
      <button class="chip" data-focus="volleyball" type="button">Volleyball</button>
    </div>
  </div>
  <button class="startBtn" id="buildBtn" type="button">Build my workout</button>
  <div class="planPreview" id="planPreview"></div>
</section>

<!-- WORK -->
<section class="stage hidden" id="workStage">
  <div class="topline"><div><div class="eyebrow" id="eyebrow">TODAY'S SESSION</div><div class="title" id="title">Ready</div></div><div class="timer" id="timer">40</div></div>
  <div class="media" id="media">
    <button class="sound" id="soundButton" type="button">Sound on</button>
    <video class="show" id="video" muted loop playsinline preload="auto"></video>
    <img class="hide" id="frame" alt="" decoding="async">
    <div class="phaseOverlay"><div class="cue" id="cue">Press start when you're ready.</div><div class="next" id="nextLabel"></div></div>
  </div>
  <div class="bottomInfo"><div class="progress"><div class="fill" id="fill"></div></div><div class="roundStrip" id="roundStrip"></div></div>
</section>

<!-- COMPLETE -->
<section class="complete hidden" id="completeStage"><div><div class="eyebrow">SESSION COMPLETE</div><h1>Strong work.</h1><div class="meta" id="completeMeta">Nice session.</div><button class="startBtn" id="againBtn" type="button" style="margin-top:18px">New workout</button></div></section>

<div class="controls hidden" id="controls">
  <button class="btn" id="pause" disabled type="button">Pause</button>
  <button class="btn primary" id="mainButton" type="button">Start</button>
  <button class="btn" id="reset" type="button">Menu</button>
</div>
</main>

<div class="modal hidden" id="planModal" role="dialog" aria-modal="true" aria-labelledby="planTitle">
  <div class="sheet"><div class="sheetHead"><div><div class="sheetTitle" id="planTitle">Your workout</div><div class="meta" id="planSub"></div></div><button class="close" id="closePlan" type="button">Close</button></div><div class="plan" id="plan"></div></div>
</div>

<audio id="tickAudio" src="audio/tick.mp3" preload="auto"></audio>
<audio id="goAudio" src="audio/go.mp3" preload="auto"></audio>
<audio id="restAudio" src="audio/rest.mp3" preload="auto"></audio>

{name:"Cable crossover",cue:"Slight bend, squeeze across the chest.",level:"beginner",impact:"low",focus:["upper"],equip:"gym",img:"Cable_Crossover"},
{name:"Leg extensions",cue:"Squeeze the quads at the top, control down.",level:"beginner",impact:"low",focus:["legs"],equip:"gym",img:"Leg_Extensions"},
{name:"Leg curls",cue:"Curl the heels, squeeze the hamstrings.",level:"beginner",impact:"low",focus:["legs"],equip:"gym",img:"Lying_Leg_Curls"},
{name:"Barbell lunges",cue:"Long stride, drop and drive.",level:"intermediate",impact:"low",focus:["legs", "glutes"],equip:"gym",img:"Barbell_Lunge"},
{name:"Calf raises",cue:"Rise onto the toes, squeeze, slow down.",level:"beginner",impact:"low",focus:["legs"],equip:"gym",img:"Standing_Barbell_Calf_Raise"}
];
const CDN="https://cdn.jsdelivr.net/gh/yuhonas/free-exercise-db@main/exercises/";
const RAW="https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/";

/* ---------- difficulty presets ---------- */
const DIFF={
  easy:  {work:35,rest:25,rounds:10,levels:["beginner"],allowHigh:false,label:"Easy"},
  medium:{work:40,rest:20,rounds:14,levels:["beginner","intermediate"],allowHigh:true,label:"Medium"},
  hard:  {work:45,rest:15,rounds:18,levels:["beginner","intermediate","expert"],allowHigh:true,preferHigh:true,label:"Hard"}
};

/* ---------- focus parsing ---------- */
const FOCUS_WORDS={
  core:["core","ab","abs","abdomin","stomach","belly","oblique","tummy","midsection"],
  legs:["leg","legs","quad","thigh","calf","calve","hamstring","lower body"],
  glutes:["glute","glutes","butt","booty","bum","hip"],
  upper:["upper","arm","arms","chest","push","shoulder","back","tricep","bicep","press"],
  cardio:["cardio","hiit","conditioning","heart","sweat","endurance","fat"],
  full:["full","total","whole","everything","all over","general","entire"],
  volleyball:["volleyball","vball","v-ball","volley"]
};
function parseFocus(text){
  const t=(text||"").toLowerCase();
  const set=new Set();
  for(const key in FOCUS_WORDS){ if(FOCUS_WORDS[key].some(w=>t.includes(w))) set.add(key); }
  if(set.has("volleyball")) return ["volleyball"];
  if(set.has("full")){ return null; } // full body = everything
  return set.size? [...set] : null;
}

/* ---------- workout generation ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function generate(diffKey, focusKeys, equipKey){
  const d=DIFF[diffKey];
  let pool=LIBRARY.filter(e=>d.levels.includes(e.level));
  if(!d.allowHigh) pool=pool.filter(e=>e.impact==="low");
  // equipment filter
  if(equipKey==="none") pool=pool.filter(e=>e.equip==="none");
  else if(equipKey==="dumbbell") pool=pool.filter(e=>e.equip==="none"||e.equip==="dumbbell");
  // gym = everything
  let focused=pool;
  const isVB = focusKeys && focusKeys.length===1 && focusKeys[0]==="volleyball";
  if(isVB){
    focused=pool.filter(e=>e.vb);
    if(focused.length<5){ focused=LIBRARY.filter(e=>e.vb && (d.allowHigh||e.impact==="low") && (equipKey==="gym"||e.equip==="none"||(equipKey==="dumbbell"&&e.equip!=="gym"))); }
    if(focused.length<5) focused=LIBRARY.filter(e=>e.vb);
  } else if(focusKeys && focusKeys.length){
    const wanted=new Set(focusKeys);
    focused=pool.filter(e=>e.focus.some(f=>wanted.has(f)));
    if(focused.length<5) focused=pool; // relax if too narrow
  }
  // hard prefers some high-impact
  let bag=shuffle(focused);
  if(d.preferHigh){
    const hi=shuffle(focused.filter(e=>e.impact==="high"));
    const lo=shuffle(focused.filter(e=>e.impact!=="high"));
    bag=[]; while(hi.length||lo.length){ if(hi.length)bag.push(hi.shift()); if(hi.length)bag.push(hi.shift()); if(lo.length)bag.push(lo.shift()); }
  }
  // build ordered list, avoid back-to-back repeats
  const out=[]; let i=0, guard=0;
  while(out.length<d.rounds && guard<d.rounds*20){
    const pick=bag[i%bag.length];
    if(!out.length || out[out.length-1].name!==pick.name) out.push(pick);
    i++; guard++;
    if(i%bag.length===0) bag=shuffle(bag);
  }
  return {work:d.work,rest:d.rest,list:out,label:d.label};
}

/* ---------- state ---------- */
let plan=null, WORK=40, REST=20, TOTAL=0, ROUNDS=0;
let phase="menu", index=0, seconds=40, running=false, timerId=null, soundOn=true, currentKey="", frameTimer=null;
let selDiff="medium", selEquip="none";
const $=id=>document.getElementById(id);
const fmt=v=>`${Math.floor(v/60)}:${String(Math.max(0,v)%60).padStart(2,"0")}`;

/* ---------- audio: coexist with device music ---------- */
try{ if(navigator.audioSession) navigator.audioSession.type="ambient"; }catch(e){}
function playSound(id){ if(!soundOn)return; const a=$(id); try{a.volume=voiceActive?0.35:1; a.currentTime=0; a.play().catch(()=>{});}catch(e){} }

/* ---------- voice: premium (ElevenLabs via function) + device fallback ---------- */
let coachVoice=null, premiumOK=true, voiceActive=false;
const voiceAudio=new Audio(); voiceAudio.preload="auto";
const speechCache=new Map();
function loadCoachVoice(){
  if(!("speechSynthesis" in window))return;
  const v=window.speechSynthesis.getVoices();
  coachVoice=v.find(x=>/en(-|_)(US|GB|AU)/i.test(x.lang)&&/(Samantha|Google US English|Google UK English Female|Karen|Moira|Aria|Jenny|Natural|Neural|Enhanced)/i.test(x.name))
    || v.find(x=>/^en/i.test(x.lang)&&/female|Samantha|Google/i.test(x.name))
    || v.find(x=>/^en/i.test(x.lang)) || v[0] || null;
}
if("speechSynthesis" in window){ loadCoachVoice(); window.speechSynthesis.addEventListener?.("voiceschanged",loadCoachVoice); }
function browserSay(text){
  if(!("speechSynthesis" in window))return;
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    if(coachVoice)u.voice=coachVoice;
    u.lang=coachVoice?.lang||"en-US"; u.rate=1.06; u.pitch=1.12; u.volume=1;
    u.onstart=()=>duck(true); u.onend=()=>duck(false); u.onerror=()=>duck(false);
    window.speechSynthesis.speak(u);
    setTimeout(()=>window.speechSynthesis.resume(),80);
  }catch(e){ duck(false); }
}
function duck(on){ voiceActive=on; [ "tickAudio","goAudio","restAudio"].forEach(id=>{const a=$(id); if(a) a.volume=on?0.35:1;}); }
async function premiumSay(text){
  try{
    let url=speechCache.get(text);
    if(!url){
      const r=await fetch("/.netlify/functions/say",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})});
      if(r.status===204){ premiumOK=false; return browserSay(text); }
      if(!r.ok){ return browserSay(text); }
      const blob=await r.blob();
      if(!blob || blob.size<200){ return browserSay(text); }
      url=URL.createObjectURL(blob); speechCache.set(text,url);
    }
    voiceAudio.src=url; voiceAudio.volume=1;
    duck(true);
    voiceAudio.onended=()=>duck(false); voiceAudio.onerror=()=>{duck(false);browserSay(text);};
    await voiceAudio.play();
  }catch(e){ browserSay(text); }
}
function say(text){ if(!soundOn)return; if(premiumOK) premiumSay(text); else browserSay(text); }
function unlockAudio(){
  try{ if(navigator.audioSession) navigator.audioSession.type="ambient"; }catch(e){}
  if("speechSynthesis" in window){ try{const u=new SpeechSynthesisUtterance(" ");u.volume=0.01;window.speechSynthesis.speak(u);}catch(e){} }
  try{ voiceAudio.play().then(()=>voiceAudio.pause()).catch(()=>{}); }catch(e){}
}

/* enthusiastic phrasing */
const HYPE_START=["Let's go!","Here we go!","You've got this!","Time to work!","Let's move!"];
const HYPE_MID=["Looking strong!","Keep it up!","Stay with it!","You're crushing this!","Halfway hero!","Don't quit now!"];
const SUPPORT=["You're doing amazing.","Breathe and stay strong.","Every rep counts.","So proud of you.","Keep that form tight.","You're tougher than this.","Nearly there, stay with it.","Beautiful work, keep going.","Strong and steady, you've got this.","Look at you go."];
let noteThisRound=false, noteGap=2, sinceNote=0;
const pick=a=>a[Math.floor(Math.random()*a.length)];

/* ---------- media ---------- */
function frameURL(id,n){ return CDN+id+"/"+n+".jpg"; }
function showVideo(item){
  const v=$("video"), img=$("frame"), media=$("media");
  clearInterval(frameTimer); frameTimer=null;
  img.classList.add("hide"); v.classList.remove("hide");
  media.classList.add("is-switching");
  v.src=item.video; v.load();
  v.oncanplay=()=>{ media.classList.remove("is-switching"); if(running)v.play().catch(()=>{}); };
  v.onerror=()=>media.classList.remove("is-switching");
}
function showImage(item){
  const v=$("video"), img=$("frame"), media=$("media");
  try{ v.pause(); }catch(e){} v.classList.add("hide"); img.classList.remove("hide");
  clearInterval(frameTimer); frameTimer=null;
  media.classList.add("is-switching");
  const f0=frameURL(item.img,0), f1=frameURL(item.img,1);
  let toggled=false;
  img.onerror=()=>{ if(img.src.startsWith(CDN)){ img.onerror=null; img.src=RAW+item.img+"/0.jpg"; } };
  img.onload=()=>media.classList.remove("is-switching");
  img.src=f0;
  const pre=new Image(); pre.src=f1;
  frameTimer=setInterval(()=>{ if(!running && phase==="work") return; toggled=!toggled; img.src=toggled?f1:f0; }, 900);
}
function renderMedia(item){
  const key=item.name;
  if(currentKey===key){ if(item.video && running) $("video").play().catch(()=>{}); return; }
  currentKey=key;
  if(item.video) showVideo(item); else showImage(item);
}

/* ---------- engine ---------- */
function totalLeft(){
  if(phase==="menu")return TOTAL; if(phase==="complete")return 0;
  const per=WORK+REST; const completed=index*per+(phase==="rest"?WORK:0);
  return Math.max(0,TOTAL-completed-((phase==="work"?WORK:REST)-seconds));
}
function cur(){ return plan.list[Math.min(index,plan.list.length-1)]; }
function nxt(){ return plan.list[Math.min(index+1,plan.list.length-1)]; }
function renderDots(){ const s=$("roundStrip"); s.innerHTML=""; plan.list.forEach((_,i)=>{const el=document.createElement("div");el.className="roundDot"+(i<index?" done":"")+(i===index&&phase!=="complete"?" active":"");s.appendChild(el)}); }
function buildPlanSheet(){
  const p=$("plan"); p.innerHTML="";
  plan.list.forEach((x,i)=>{ const row=document.createElement("div");
    row.className="planItem"+(i===index&&phase!=="complete"?" active":"")+(i<index||phase==="complete"?" done":"");
    row.innerHTML=`<div class="num">${i+1}</div><div><div class="planName">${x.name}</div><div class="planTiming">${plan.work}s work · ${plan.rest}s rest</div></div><div class="planTiming">${fmt(i*(plan.work+plan.rest))}</div>`;
    p.appendChild(row); });
  const a=p.querySelector(".active"); if(a)setTimeout(()=>a.scrollIntoView({block:"center"}),0);
  $("planSub").textContent=`${plan.label} · ${plan.list.length} rounds · ${fmt(TOTAL)}`;
}
function render(){
  const complete=phase==="complete";
  $("workStage").classList.toggle("hidden",complete||phase==="menu");
  $("completeStage").classList.toggle("hidden",!complete);
  $("badge").textContent=phase==="menu"?"READY":phase.toUpperCase();
  $("meta").textContent=`${fmt(totalLeft())} left · ${Math.min(index+1,ROUNDS)}/${ROUNDS}`;
  $("pause").disabled=phase==="menu"||complete; $("pause").textContent=running?"Pause":"Resume";
  $("mainButton").textContent=complete?"Menu":(phase==="menu"?"Start":"Skip");
  if(complete){ try{$("video").pause();}catch(e){} clearInterval(frameTimer); renderDots(); return; }
  const disp=phase==="rest"?nxt():cur();
  $("title").textContent=disp.name;
  $("eyebrow").textContent=phase==="rest"?"NEXT UP":"MOVE";
  $("timer").textContent=seconds; $("timer").classList.toggle("urgent",seconds<=5);
  $("fill").style.width=`${Math.max(0,seconds/(phase==="rest"?REST:WORK))*100}%`;
  $("cue").textContent=phase==="rest"?`Recover. ${disp.cue}`:disp.cue;
  $("nextLabel").textContent=index>=ROUNDS-1?"Final round":`Next: ${nxt().name}`;
  renderMedia(disp);
  renderDots();
}
function enterWork(){ phase="work"; seconds=WORK; render(); playSound("goAudio"); const x=cur();
  if(index>0){ sinceNote++; if(sinceNote>=noteGap){ noteThisRound=true; sinceNote=0; noteGap=2+Math.floor(Math.random()*2); } else noteThisRound=false; } else noteThisRound=false;
  setTimeout(()=>say(index===0?`${pick(HYPE_START)} First up, ${x.name}. ${x.cue}`:`${x.name}. ${x.cue}`),240); }
function enterRest(){ phase="rest"; seconds=REST; render(); playSound("restAudio"); const x=nxt();
  const mid=(index>0 && index%4===0)? pick(HYPE_MID)+" ":""; setTimeout(()=>say(`${mid}Recover. Next up, ${x.name}.`),240); }
function finish(){ phase="complete"; seconds=0; running=false; clearInterval(timerId); timerId=null; clearInterval(frameTimer);
  $("completeMeta").textContent=`${plan.label} · ${ROUNDS} rounds · ${fmt(TOTAL)} done.`; render(); playSound("goAudio"); say("Outstanding! Workout complete. Be proud of that."); releaseWake(); }
function advance(){ if(phase==="work"){enterRest();} else if(phase==="rest"){ if(index>=ROUNDS-1)finish(); else{index++;enterWork();} } }
function tick(){ if(!running)return; seconds--; if(seconds<=0){advance();return;}
  if(phase==="work" && noteThisRound && seconds===Math.max(4,Math.round(WORK/2))){ noteThisRound=false; say(pick(SUPPORT)); }
  if(seconds<=3)playSound("tickAudio"); render(); }

/* ---------- wake lock ---------- */
let wake=null;
async function reqWake(){ if(!running||!("wakeLock" in navigator))return; try{wake=await navigator.wakeLock.request("screen");wake.addEventListener("release",()=>wake=null);}catch(e){} }
function releaseWake(){ try{wake?.release();}catch(e){} wake=null; }

/* ---------- controls ---------- */
function startWorkout(){ unlockAudio(); running=true; reqWake(); if(phase!=="work"&&phase!=="rest")enterWork(); if(timerId===null)timerId=setInterval(tick,1000);
  $("menuStage").classList.add("hidden"); $("controls").classList.remove("hidden"); $("badge").classList.remove("hidden"); $("meta").classList.remove("hidden");
  const v=$("video"); if(cur().video)v.play().catch(()=>{}); render(); }
function toMenu(){ running=false; releaseWake(); if("speechSynthesis" in window)window.speechSynthesis.cancel(); try{voiceAudio.pause();}catch(e){}
  if(timerId!==null)clearInterval(timerId); timerId=null; clearInterval(frameTimer);
  phase="menu"; index=0; currentKey="";
  $("menuStage").classList.remove("hidden"); $("workStage").classList.add("hidden"); $("completeStage").classList.add("hidden");
  $("controls").classList.add("hidden"); $("badge").classList.add("hidden"); $("meta").classList.add("hidden"); updatePreview(); }

/* ---------- menu wiring ---------- */
function updatePreview(){ const f=parseFocus($("focusInput").value); const p=generate(selDiff,f,selEquip);
  $("planPreview").textContent=`${DIFF[selDiff].label} · ${p.list.length} rounds · ~${Math.round((p.work+p.rest)*p.list.length/60)} min`; }
$("diffGrid").addEventListener("click",e=>{ const c=e.target.closest(".diffCard"); if(!c)return; selDiff=c.dataset.diff;
  [...$("diffGrid").children].forEach(x=>x.classList.toggle("sel",x===c)); updatePreview(); });
$("equipGrid").addEventListener("click",e=>{ const c=e.target.closest(".diffCard"); if(!c)return; selEquip=c.dataset.equip;
  [...$("equipGrid").children].forEach(x=>x.classList.toggle("sel",x===c)); updatePreview(); });
$("chips").addEventListener("click",e=>{ const c=e.target.closest(".chip"); if(!c)return; const val=c.dataset.focus;
  const cur=$("focusInput").value.trim();
  if(val==="full"||val==="volleyball"){ $("focusInput").value=(val==="volleyball"?"volleyball":"full body"); [...$("chips").children].forEach(x=>x.classList.toggle("on",x===c)); }
  else { c.classList.toggle("on"); const on=[...$("chips").children].filter(x=>x.classList.contains("on")&&x.dataset.focus!=="full").map(x=>x.textContent); $("focusInput").value=on.join(", "); }
  updatePreview(); });
$("focusInput").addEventListener("input",()=>{ [...$("chips").children].forEach(x=>x.classList.remove("on")); updatePreview(); });
$("buildBtn").addEventListener("click",()=>{ const f=parseFocus($("focusInput").value); plan=generate(selDiff,f,selEquip);
  WORK=plan.work; REST=plan.rest; ROUNDS=plan.list.length; TOTAL=ROUNDS*(WORK+REST); index=0; seconds=WORK; phase="ready"; currentKey=""; sinceNote=0; noteGap=2+Math.floor(Math.random()*2); noteThisRound=false;
  buildPlanSheet(); unlockAudio(); startWorkout(); });
$("againBtn").addEventListener("click",toMenu);

$("mainButton").addEventListener("click",()=>{ if(phase==="complete"){toMenu();return;} if(phase==="menu")return; advance(); });
$("pause").addEventListener("click",()=>{ if(phase==="menu"||phase==="complete")return; running=!running;
  if(running){ reqWake(); if(cur().video)$("video").play().catch(()=>{}); say(pick(["Back to it!","Let's keep moving!","Here we go!"])); }
  else { releaseWake(); try{$("video").pause();}catch(e){} if("speechSynthesis" in window)window.speechSynthesis.cancel(); try{voiceAudio.pause();}catch(e){} }
  render(); });
$("reset").addEventListener("click",toMenu);
$("soundButton").addEventListener("click",()=>{ soundOn=!soundOn; $("soundButton").textContent=soundOn?"Sound on":"Sound off";
  if(soundOn){ unlockAudio(); setTimeout(()=>say("Coach voice on. Let's do this!"),120); } else { if("speechSynthesis" in window)window.speechSynthesis.cancel(); try{voiceAudio.pause();}catch(e){} } });
$("planButton").addEventListener("click",()=>{ if(phase==="menu"||!plan)return; buildPlanSheet(); $("planModal").classList.remove("hidden"); });
$("closePlan").addEventListener("click",()=>$("planModal").classList.add("hidden"));
$("planModal").addEventListener("click",e=>{ if(e.target===$("planModal"))$("planModal").classList.add("hidden"); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape")$("planModal").classList.add("hidden"); });
document.addEventListener("visibilitychange",()=>{ if(document.hidden){ try{$("video").pause();}catch(e){} } else if(running && cur().video){ reqWake(); $("video").play().catch(()=>{}); } });
window.addEventListener("pagehide",releaseWake);

updatePreview();
</script>
